name: Minecraft AFK Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Run bot loop (5h with 5min restart buffer)
        run: |
          end=$((SECONDS+18000))

          while [ $SECONDS -lt $end ]; do
            echo "Starting bot at $(date)"

            timeout 25m node bot.js || true

            echo "Restarting in 5 minutes..."
            sleep 300
          done
        env:
          MC_HOST: ${{ secrets.MC_HOST }}
          MC_USER: ${{ secrets.MC_USER }}
